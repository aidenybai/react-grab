name: Test Perf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  perf-shard:
    name: perf-shard (${{ matrix.artifact-suffix }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # The control trace takes about 1.8 minutes per revision, so keeping it
          # out of count-based sharding prevents one runner from owning half the suite.
          - test_shard: "1/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-1-of-6
          - test_shard: "2/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-2-of-6
          - test_shard: "3/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-3-of-6
          - test_shard: "4/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-4-of-6
          - test_shard: "5/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-5-of-6
          - test_shard: "6/6"
            test_grep: "@perf"
            test_grep_invert: "animation-scheduling-controls"
            artifact-suffix: regular-6-of-6
          - test_shard: "1/1"
            test_grep: "animation-scheduling-controls @perf"
            test_grep_invert: "(?!)"
            artifact-suffix: animation-controls

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter react-grab exec playwright install chromium --with-deps

      # Swap only `packages/react-grab/src/` so the HEAD harness and fixture
      # measure the base library code. Each shard keeps its base and HEAD
      # measurements on the same runner to preserve paired CPU/GPU controls.
      - name: Swap react-grab src to base ref
        id: swap-base
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch origin "$BASE_SHA" --depth=1
          if git cat-file -e "$BASE_SHA:packages/react-grab/src" 2>/dev/null; then
            git checkout "$BASE_SHA" -- packages/react-grab/src
            echo "swapped=true" >> "$GITHUB_OUTPUT"
            echo "Swapped react-grab/src to base revision $BASE_SHA"
          else
            echo "Base ref lacks packages/react-grab/src; skipping baseline run."
            echo "swapped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run paired shard against base ref src
        if: github.event_name == 'pull_request' && steps.swap-base.outputs.swapped == 'true'
        env:
          PERF_LABEL: baseline
          PERF_SHARDABLE: "1"
          PERF_TEST_GREP: ${{ matrix.test_grep }}
          PERF_TEST_GREP_INVERT: ${{ matrix.test_grep_invert }}
          PERF_TEST_SHARD: ${{ matrix.test_shard }}
        # One worker prevents concurrent scenarios from contaminating the
        # process and compositor measurements. Parallelism only exists across
        # isolated GitHub runners, with the same scenario shard used for both refs.
        run: pnpm --filter react-grab exec playwright test --grep "$PERF_TEST_GREP" --grep-invert "$PERF_TEST_GREP_INVERT" --workers=1 --shard="$PERF_TEST_SHARD" --reporter=list

      - name: Restore react-grab src to HEAD
        if: github.event_name == 'pull_request' && steps.swap-base.outputs.swapped == 'true'
        run: git checkout HEAD -- packages/react-grab/src

      - name: Run paired shard against HEAD src
        env:
          PERF_LABEL: current
          PERF_SHARDABLE: "1"
          PERF_TEST_GREP: ${{ matrix.test_grep }}
          PERF_TEST_GREP_INVERT: ${{ matrix.test_grep_invert }}
          PERF_TEST_SHARD: ${{ matrix.test_shard }}
        run: pnpm --filter react-grab exec playwright test --grep "$PERF_TEST_GREP" --grep-invert "$PERF_TEST_GREP_INVERT" --workers=1 --shard="$PERF_TEST_SHARD" --reporter=list

      - name: Upload shard reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports-${{ matrix.artifact-suffix }}
          path: packages/react-grab/perf/
          if-no-files-found: warn
          retention-days: 1

  test-perf:
    needs: perf-shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: perf-reports-*
          path: packages/react-grab/perf
          merge-multiple: true

      - name: Compute baseline-vs-current diff
        if: github.event_name == 'pull_request' && needs.perf-shard.result == 'success'
        run: |
          node packages/react-grab/scripts/diff-perf-runs.mjs packages/react-grab/perf/baseline packages/react-grab/perf/current | tee perf-diff.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf diff
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: perf-diff
          path: perf-diff.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload merged perf reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-bench-${{ github.event.pull_request.number || github.sha }}
          path: packages/react-grab/perf/
          if-no-files-found: warn
          retention-days: 14

      - name: Verify perf shards
        if: always() && needs.perf-shard.result != 'success'
        run: |
          echo "One or more paired perf shards failed: ${{ needs.perf-shard.result }}"
          exit 1

  # The write-scoped token never coexists with a job that executes PR code.
  # This job only downloads the merged diff and maintains one sticky comment,
  # while the benchmark and aggregation jobs retain read-only permissions.
  perf-comment:
    needs: test-perf
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    steps:
      - name: Download perf diff
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: perf-diff

      - name: Post perf diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { readFileSync } = require("node:fs");
            const marker = "<!-- perf-diff-comment -->";
            let diffBody;
            try {
              diffBody = readFileSync("perf-diff.md", "utf8").trim();
            } catch {
              return;
            }
            if (!diffBody) return;
            const body = `${marker}\n${diffBody}\n\n<sub>Commit ${context.payload.pull_request.head.sha.slice(0, 7)} · full reports in the \`perf-bench-${context.payload.pull_request.number}\` artifact.</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existingComment = comments.find((comment) => comment.body?.startsWith(marker));
            if (existingComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
