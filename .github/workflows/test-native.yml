name: Test Native

on:
  push:
    branches: [main]
    paths:
      - "apps/e2e-app-expo/**"
      - "apps/e2e-app-react-native/**"
      - "packages/native-e2e/**"
      - "packages/react-grab-native/**"
      - "packages/react-grab/**"
      - ".github/workflows/test-native.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/e2e-app-expo/**"
      - "apps/e2e-app-react-native/**"
      - "packages/native-e2e/**"
      - "packages/react-grab-native/**"
      - "packages/react-grab/**"
      - ".github/workflows/test-native.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ios:
    name: test-ios (${{ matrix.runtime.name }})
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: expo
            app_directory: apps/e2e-app-expo
            app_binary: apps/e2e-app-expo/ios/build/Build/Products/Debug-iphonesimulator/reactgrabe2eexpo.app
            detox_configuration: ios.expo.debug
          - name: react-native
            app_directory: apps/e2e-app-react-native
            app_binary: apps/e2e-app-react-native/ios/build/Build/Products/Debug-iphonesimulator/ReactGrabE2EReactNative.app
            detox_configuration: ios.react-native.debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Pre-boot simulator
        run: |
          available_devices=$(xcrun simctl list devices available)
          device_line=""
          while IFS= read -r candidate_device_line; do
            if [[ "$candidate_device_line" =~ ^[[:space:]]*iPhone[[:space:]] ]]; then
              device_line="$candidate_device_line"
              break
            fi
          done <<< "$available_devices"
          device_pattern='^[[:space:]]*(iPhone.*)[[:space:]]\(([0-9A-Fa-f-]+)\)'
          if [[ ! "$device_line" =~ $device_pattern ]]; then
            echo "Unable to find an available iPhone simulator" >&2
            exit 1
          fi
          device_name="${BASH_REMATCH[1]}"
          device_udid="${BASH_REMATCH[2]}"
          echo "Pre-booting simulator: $device_name"
          echo "DETOX_DEVICE_NAME=$device_name" >> "$GITHUB_ENV"
          xcrun simctl boot "$device_udid" || true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build packages
        run: pnpm build

      - name: Install applesimutils
        run: brew tap wix/brew && brew trust wix/brew && brew install applesimutils

      - name: Get Xcode version
        id: xcode
        run: echo "version=$(xcodebuild -version | tr -d '\n' | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache iOS app binary
        id: app-cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.runtime.app_binary }}
          key: native-app-${{ matrix.runtime.name }}-${{ steps.xcode.outputs.version }}-${{ hashFiles('pnpm-lock.yaml', 'apps/e2e-app-expo/app.json', 'apps/e2e-app-expo/package.json', 'apps/e2e-app-react-native/app.json', 'apps/e2e-app-react-native/package.json', 'apps/e2e-app-react-native/ios/**') }}

      - name: Cache CocoaPods downloads
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-${{ matrix.runtime.name }}-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: cocoapods-${{ matrix.runtime.name }}-${{ runner.os }}-

      - name: Build iOS app
        if: steps.app-cache.outputs.cache-hit != 'true'
        working-directory: ${{ matrix.runtime.app_directory }}
        run: pnpm run build:ios

      - name: Start Metro
        working-directory: ${{ matrix.runtime.app_directory }}
        run: |
          nohup pnpm run start -- --port 8081 > /tmp/metro.log 2>&1 &
          for readiness_attempt in $(seq 1 60); do
            if curl -sf http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is up"
              exit 0
            fi
            sleep 2
          done
          echo "Metro failed after $readiness_attempt attempts" >&2
          cat /tmp/metro.log >&2
          exit 1

      - name: Warm React Native bundle
        if: matrix.runtime.name == 'react-native'
        run: >
          curl --fail --silent --show-error --max-time 600 --output /dev/null
          "http://localhost:8081/index.bundle?platform=ios&dev=true&lazy=true&minify=false&inlineSourceMap=false&modulesOnly=false&runModule=true&excludeSource=true&sourcePaths=url-server&app=com.reactgrab.e2ereactnative"

      - name: Cache Detox framework
        id: detox-framework-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox/ios
          key: detox-framework-${{ steps.xcode.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build Detox framework cache
        if: steps.detox-framework-cache.outputs.cache-hit != 'true'
        working-directory: packages/native-e2e
        run: pnpm exec detox clean-framework-cache && pnpm exec detox build-framework-cache

      - name: Run Detox tests
        working-directory: packages/native-e2e
        env:
          NATIVE_RUNTIME: ${{ matrix.runtime.name }}
        run: pnpm exec detox test --configuration "${{ matrix.runtime.detox_configuration }}" --device-name "$DETOX_DEVICE_NAME" --headless --record-logs failing

      - name: Upload Metro log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metro-log-${{ matrix.runtime.name }}
          path: /tmp/metro.log
          retention-days: 14

      - name: Upload Detox artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-${{ matrix.runtime.name }}
          path: packages/native-e2e/artifacts/
          retention-days: 14
          if-no-files-found: ignore
