name: Benchmark

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter next-app exec playwright install chromium --with-deps

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build
        run: pnpm build

      - name: Run benchmark
        run: pnpm --filter next-app exec playwright test e2e/bench.spec.ts
        env:
          BENCH_CLAUDE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/website/app/benchmarks/data.json
          git diff --cached --quiet || git commit -m "Update benchmark data [skip ci]"
          git push
