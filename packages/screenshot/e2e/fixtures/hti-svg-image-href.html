<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>hti svg image href</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        height: 200px;
        width: 200px;
        background-color: #fff;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <image height="200" width="200" href="./assets/hti-svg-image.png" />
      </svg>
    </div>
  </body>
</html>
