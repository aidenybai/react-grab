<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>01 solid box</title>
    <style>
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 400px;
        height: 300px;
        background: #2f6fdb;
      }
      .band {
        width: 400px;
        height: 60px;
        background: #14304f;
      }
      .inset {
        width: 280px;
        height: 120px;
        margin: 30px 0 0 60px;
        padding: 20px;
        background: #e4572e;
      }
      .core {
        width: 100px;
        height: 80px;
        background: #f4c542;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div class="band"></div>
      <div class="inset">
        <div class="core"></div>
      </div>
    </div>
  </body>
</html>
