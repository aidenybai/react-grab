<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>hti small strips</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 100px;
        height: 9px;
        background: #ffffff;
      }
      .red {
        background-color: red;
      }
      .green {
        background-color: green;
      }
      .blue {
        background-color: blue;
      }
      .red,
      .green,
      .blue {
        border: 1px solid lightgrey;
        height: 3px;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div class="red"></div>
      <div class="green"></div>
      <div class="blue"></div>
    </div>
  </body>
</html>
