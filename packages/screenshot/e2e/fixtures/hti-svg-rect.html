<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>hti svg rect</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 120px;
        height: 120px;
        background: #ffffff;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="100" height="100" />
      </svg>
    </div>
  </body>
</html>
