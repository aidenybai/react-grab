<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ms max height important override</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 200px;
        height: 180px;
        background: #ffffff;
        overflow: hidden;
        font-family: "Inter Fixture", sans-serif;
        font-size: 16px;
        line-height: 20px;
        color: #1d2731;
      }
      .container .root {
        background-color: blue;
        margin-bottom: 50px;
      }
      .container .min-height {
        max-height: unset !important;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div class="container">
        <div class="root">
          <div class="min-height" style="max-height: 50px; overflow: hidden">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
