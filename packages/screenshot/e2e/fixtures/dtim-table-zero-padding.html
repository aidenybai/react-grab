<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dtim table zero padding</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
        font-family: "Inter Fixture", sans-serif;
        font-size: 14px;
        color: #000000;
      }
      th,
      td {
        padding: 0px;
        border: 2px solid #585c5c;
      }
      * {
        box-sizing: border-box;
      }
      table {
        border-collapse: collapse;
      }
      #target {
        width: 200px;
        height: 90px;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div id="mywrap" class="wrapper">
        <!-- The <style> element inside the captured subtree is part of what
             the original fixture exercises. -->
        <style type="text/css">
          .tg {
            border-collapse: collapse;
            border-spacing: 0;
          }

          .tg .tg-lqy6 {
            text-align: right;
            vertical-align: top;
          }

          .tg .tg-ogn4 {
            background-color: #cb0000;
            text-align: right;
            vertical-align: top;
          }

          .tg .tg-zv49 {
            background-color: #6200c9;
            color: #ffffff;
            text-align: right;
            vertical-align: top;
          }

          .wrapper {
            display: inline-block;
          }
        </style>
        <table class="tg">
          <thead>
            <tr>
              <th class="tg-lqy6"></th>
              <th class="tg-lqy6" style="padding-left: 5px"></th>
              <th class="tg-ogn4">aaaaa</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="tg-lqy6"></td>
              <td class="tg-lqy6"></td>
              <td class="tg-ogn4">aaaaaa</td>
            </tr>
            <tr>
              <td class="tg-zv49">ssssss</td>
              <td class="tg-zv49">sssss</td>
              <td class="tg-zv49">aaaaaaa</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
