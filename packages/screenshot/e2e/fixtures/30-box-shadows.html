<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>30 box shadows</title>
    <style>
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 480px;
        height: 320px;
        background: #eef1f5;
        position: relative;
      }
      .soft {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 100px;
        height: 70px;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(20, 48, 79, 0.35);
      }
      .layered {
        position: absolute;
        top: 40px;
        left: 200px;
        width: 100px;
        height: 70px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.25),
          0 6px 12px rgba(47, 111, 219, 0.4),
          0 14px 24px rgba(122, 59, 143, 0.3);
      }
      .hard-offset {
        position: absolute;
        top: 40px;
        left: 356px;
        width: 84px;
        height: 70px;
        background: #f4c542;
        box-shadow: 10px 10px 0 #14304f;
      }
      .inset-single {
        position: absolute;
        top: 180px;
        left: 40px;
        width: 100px;
        height: 90px;
        background: #dfe9f5;
        box-shadow: inset 6px 6px 14px rgba(20, 48, 79, 0.55);
      }
      .inset-and-outset {
        position: absolute;
        top: 180px;
        left: 200px;
        width: 100px;
        height: 90px;
        background: #1f6f54;
        border-radius: 14px;
        box-shadow:
          inset 0 -10px 16px rgba(0, 0, 0, 0.5),
          inset 0 8px 10px rgba(255, 255, 255, 0.35),
          0 10px 18px rgba(31, 111, 84, 0.5);
      }
      .spread {
        position: absolute;
        top: 190px;
        left: 366px;
        width: 64px;
        height: 64px;
        background: #c0392b;
        border-radius: 50%;
        box-shadow:
          0 0 0 8px #ffffff,
          0 0 0 12px #c0392b,
          0 6px 16px 4px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div class="soft"></div>
      <div class="layered"></div>
      <div class="hard-offset"></div>
      <div class="inset-single"></div>
      <div class="inset-and-outset"></div>
      <div class="spread"></div>
    </div>
  </body>
</html>
