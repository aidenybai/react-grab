<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ms video poster</title>
    <style>
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 200px;
        height: 200px;
        background: #ffffff;
      }
      video {
        display: block;
        width: 200px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <video width="200" height="200" poster="./assets/ms-image.png" preload="none">
        <source type="video/mp4" />
        Sorry, your browser doesn't support embedded videos.
      </video>
    </div>
  </body>
</html>
