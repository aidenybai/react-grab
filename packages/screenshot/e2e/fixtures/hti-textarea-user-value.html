<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>hti textarea user value</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 400px;
        height: 200px;
        background-color: white;
        padding: 1em;
      }
      textarea {
        height: 100%;
        width: 100%;
        font-family: "Inter Fixture", monospace;
        font-size: 20px;
        border: 1px solid grey;
        padding: 1em;
        resize: none;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <textarea id="input"></textarea>
    </div>
    <script>
      /* Multi-line value set programmatically, like the original test. */
      document.getElementById("input").value = "USER\nINPUT";
    </script>
  </body>
</html>
