<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>lim transformed root rotated</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      .stage {
        padding: 80px 0 0 100px;
      }
      #target {
        width: 340px;
        height: 200px;
        transform: rotate(12deg);
        background: #ffffff;
        border: 4px solid #14304f;
        border-radius: 12px;
        box-sizing: border-box;
        padding: 20px;
        font-family: "Inter Fixture", sans-serif;
        font-size: 15px;
        color: #1d2731;
      }
      .badge {
        display: inline-block;
        margin-top: 12px;
        padding: 6px 14px;
        background: #2f6fdb;
        color: #ffffff;
        border-radius: 999px;
      }
      .stripe {
        margin-top: 16px;
        height: 34px;
        background: linear-gradient(90deg, #e4572e, #f0a202);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div id="target">
        <strong>Rotated card</strong>
        <div class="badge">rotate(12deg)</div>
        <div class="stripe"></div>
      </div>
    </div>
  </body>
</html>
