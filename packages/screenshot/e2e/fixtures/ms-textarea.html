<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ms textarea</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 432px;
        height: 232px;
        background-color: white;
        padding: 16px;
        box-sizing: border-box;
      }
      textarea {
        height: 100%;
        width: 100%;
        font-family: "Inter Fixture", monospace;
        font-size: 20px;
        border: 1px solid grey;
        padding: 16px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <textarea id="input">Hello</textarea>
    </div>
  </body>
</html>
