<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>lim content visibility offscreen</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      .skip-distance-spacer {
        height: 8000px;
      }
      #target {
        width: 400px;
        height: 260px;
        background: #ffffff;
        font-family: "Inter Fixture", sans-serif;
        font-size: 15px;
        color: #1d2731;
        box-sizing: border-box;
        padding: 16px;
      }
      /* Fixed height keeps the section's geometry identical whether its
         contents are skipped (at capture time, far below the viewport) or
         rendered (ground truth, scrolled into view). */
      .cv-auto {
        content-visibility: auto;
        contain-intrinsic-size: auto 140px;
        height: 140px;
        box-sizing: border-box;
        background: #dfe9f5;
        padding: 12px;
      }
      .cv-card {
        background: #14304f;
        color: #ffffff;
        padding: 10px;
        margin-bottom: 10px;
      }
      .after-block {
        margin-top: 14px;
        background: #1f7a4d;
        color: #ffffff;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <!--
      8000px below the viewport keeps the content-visibility:auto section
      skipped at capture time; its contents must still appear in the capture.
    -->
    <div class="skip-distance-spacer"></div>
    <div id="target">
      <section class="cv-auto">
        <div class="cv-card">card inside a skipped subtree</div>
        <div>plain text content that must not serialize empty</div>
      </section>
      <div class="after-block">anchor below the auto section</div>
    </div>
  </body>
</html>
