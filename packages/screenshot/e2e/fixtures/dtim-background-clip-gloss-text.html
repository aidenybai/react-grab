<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dtim background clip gloss text</title>
    <style>
      @font-face {
        font-family: "Inter Fixture";
        src: url("./assets/inter-latin-700-normal.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
      }
      body {
        margin: 0;
        background: #e8e8e8;
      }
      #target {
        width: 400px;
        height: 120px;
        background-color: white;
        color: black;
        font-family: "Inter Fixture", sans-serif;
        font-weight: 700;
        font-size: 28px;
        box-sizing: border-box;
        padding: 20px 10px;
      }
      .high-gloss {
        margin: 0;
        background: linear-gradient(
          180deg,
          rgba(50, 50, 50, 0.95) 24%,
          rgba(186, 186, 186, 1) 45%,
          rgba(226, 235, 238, 0.9514006286108193) 49%,
          rgba(50, 50, 50, 0.93) 50%,
          rgba(50, 50, 50, 0.97) 100%
        );
        color: transparent;
        text-shadow: rgba(0, 0, 0, 0.1) 5px 5px 10px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body>
    <div id="target">
      <div class="high-gloss">There's a lot of style here</div>
    </div>
  </body>
</html>
