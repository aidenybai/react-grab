<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expect Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/rrweb-player@2.0.0-alpha.18/dist/style.css"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1,
      h2 {
        color: #f8fafc;
      }
      a {
        color: #93c5fd;
      }
      #replay-container {
        margin: 16px 0;
        border-radius: 8px;
        overflow: hidden;
      }
      .status {
        text-align: center;
        padding: 16px;
        font-size: 14px;
        color: #9ca3af;
      }

      #steps-panel {
        display: none;
        margin-bottom: 24px;
        background: #1e293b;
        border-radius: 8px;
        padding: 20px;
        border: 1px solid #334155;
      }
      #steps-panel h2 {
        margin: 0 0 4px 0;
        font-size: 16px;
        font-weight: 600;
      }
      .run-status {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 8px;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      .status-running {
        background: #1e3a5f;
        color: #60a5fa;
      }
      .status-passed {
        background: #14532d;
        color: #4ade80;
      }
      .status-failed {
        background: #7f1d1d;
        color: #f87171;
      }
      #run-summary {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 16px;
      }
      #steps-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .step-item {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 6px 0;
        font-size: 14px;
        border-top: 1px solid #1e293b;
      }
      .step-item:first-child {
        border-top: none;
      }
      .step-badge {
        flex-shrink: 0;
        width: 16px;
        text-align: center;
        font-size: 13px;
      }
      .step-pending .step-badge {
        color: #64748b;
      }
      .step-active .step-badge {
        color: #60a5fa;
        animation: pulse 1.5s infinite;
      }
      .step-passed .step-badge {
        color: #4ade80;
      }
      .step-failed .step-badge {
        color: #f87171;
      }
      .step-title {
        color: #e2e8f0;
      }
      .step-summary {
        color: #94a3b8;
        font-size: 12px;
        margin-left: auto;
        max-width: 50%;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .replayer-mouse::after {
        display: none !important;
      }
      .replayer-mouse.active {
        animation: macos-click 0.2s ease-out 1 !important;
      }
      @keyframes macos-click {
        0% {
          transform: scale(1);
        }
        40% {

        }
        100% {
          transform: scale(1);
        }
      }

  </head>
  <body>
    <main style="max-width: 960px; margin: 0 auto; padding: 32px">
      <div id="steps-panel">
        <h2 id="run-title">Test Run</h2>
        <div id="run-status" class="run-status status-running">running</div>
        <div id="run-summary" style="display: none"></div>
        <ul id="steps-list"></ul>
      </div>
      <script>
        const stepsPanel = document.getElementById("steps-panel");
        const runTitle = document.getElementById("run-title");
        const runStatus = document.getElementById("run-status");
        const runSummary = document.getElementById("run-summary");
        const stepsList = document.getElementById("steps-list");
        let initialSteps = null;
        if (initialSteps) updateSteps(initialSteps);

        function updateSteps(state) {
          if (!stepsPanel || !state) return;
          stepsPanel.style.display = "block";
          if (runTitle) runTitle.textContent = state.title || "Test Run";
          if (runStatus) {
            runStatus.textContent = state.status;
            runStatus.className = "run-status status-" + state.status;
          }
          if (runSummary) {
            runSummary.textContent = state.summary || "";
            runSummary.style.display = state.summary ? "block" : "none";
          }
          if (stepsList && state.steps) {
            stepsList.innerHTML = "";
            for (const step of state.steps) {
              const li = document.createElement("li");
              li.className = "step-item step-" + step.status;
              const badge = document.createElement("span");
              badge.className = "step-badge";
              badge.textContent =
                step.status === "passed"
                  ? "\u2713"
                  : step.status === "failed"
                    ? "\u2717"
                    : step.status === "active"
                      ? "\u25CF"
                      : "\u25CB";
              const title = document.createElement("span");
              title.className = "step-title";
              title.textContent = step.title;
              li.appendChild(badge);
              li.appendChild(title);
              if (step.summary) {
                const summary = document.createElement("span");
                summary.className = "step-summary";
                summary.textContent = step.summary;
                li.appendChild(summary);
              }
              stepsList.appendChild(li);
            }
          }
        }
      </script>

      <div id="replay-container"><div class="status" id="status">Loading replay…</div></div>

      <script>
        (function () {
          var b = location.pathname
            .split("/")
            .pop()
            .replace(/\.html$/, "");
          document.write("<scr" + 'ipt src="' + b + '.ndjson.js"></scr' + "ipt>");
        })();
      </script>
      <script type="module">
        import rrwebPlayer from "https://cdn.jsdelivr.net/npm/rrweb-player@2.0.0-alpha.18/dist/rrweb-player.js";
        const container = document.getElementById("replay-container");
        const statusEl = document.getElementById("status");
        let player = null,
          allEvents = [];
        const initPlayer = (events) => {
          if (player) {
            player.getReplayer().addEvent(events.at(-1));
            return;
          }
          if (events.length < 2) return;
          statusEl?.remove();
          player = new rrwebPlayer({
            target: container,
            props: {
              events,
              width: 960,
              height: 540,
              autoPlay: false,
              showController: true,
            },
          });
        };

        if (window.__EXPECT_REPLAY_NDJSON__) {
          allEvents = window.__EXPECT_REPLAY_NDJSON__
            .trim()
            .split("\n")
            .map((l) => JSON.parse(l));
          if (allEvents.length >= 2) initPlayer(allEvents);
          else if (statusEl) statusEl.textContent = "No replay events recorded.";
        } else {
          const res = await fetch("10e5f16d-2394-4fbf-988a-5e0c450c8900.ndjson");
          if (res.ok) {
            allEvents = (await res.text())
              .trim()
              .split("\n")
              .map((l) => JSON.parse(l));
            if (allEvents.length >= 2) initPlayer(allEvents);
            else if (statusEl) statusEl.textContent = "No replay events recorded.";
          } else if (statusEl) statusEl.textContent = "Failed to load replay.";
        }
      </script>
    </main>
  </body>
</html>
